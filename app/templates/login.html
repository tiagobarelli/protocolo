<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Thṓth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { max-width: 400px; width: 100%; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 28px; border-radius: var(--radius); box-shadow: var(--shadow-md);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-main); }
    .form-group input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);
      font-size: 1rem;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    button[type="submit"] {
      width: 100%; padding: 12px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    .flash { margin-bottom: 16px; padding: 10px; border-radius: var(--radius-md); font-size: 0.9rem; }
    .flash.error { background: var(--danger-bg); color: var(--danger); }
    .flash.success { background: var(--success-bg); color: var(--success); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
<div class="header-logo" style="margin-bottom: 24px; display: flex; justify-content: center;">
  <div style="width: 96px; height: 96px; border-radius: 20px;
              background: var(--accent); color: var(--accent-foreground);
              display: grid; place-items: center;">
    <i class="ph ph-feather" style="font-size: 46px;"></i>
  </div>
</div>
      <h1>Thṓth</h1>
      <h4>Sistema de Gestão Notarial</h4>
      <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 6px;">Entre com seu e-mail e senha. A senha é a mesma usada no ODIN.</p>
    </div>
    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
          <div class="flash {{ category }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autofocus placeholder="nome@cartorioitapolis.com.br">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required placeholder="••••••••">
        </div>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
