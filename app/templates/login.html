<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Thṓth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --primary: #2f3e46;
      --primary-hover: #52796f;
      --accent: #84a98c;
      --accent-hover: #cad2c5;
      --accent-soft: #f5f5f4;
      --bg-body: #fafaf9;
      --surface: #ffffff;
      --text-main: #343A40;
      --text-dark: #212529;
      --text-muted: #495057;
      --border: #e7e5e4;
      --border-focus: #84a98c;
      --radius: 12px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --danger: #b91c1c;
      --danger-bg: #faf0ed;
      --success: #15803d;
      --success-bg: #f0f5f1;
      --warning: #d97706;
      --warning-bg: #faf5ed;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(at top right, rgba(245, 245, 244, 0.8) 0%, rgba(245, 245, 244, 0) 55%), radial-gradient(at top left, rgba(250, 250, 249, 0.9) 0%, rgba(250, 250, 249, 0) 55%);
    }
    .container { max-width: 400px; width: 100%; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 28px; border-radius: var(--radius); box-shadow: var(--shadow-md);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; color: var(--text-main); }
    .form-group input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 1rem;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    button[type="submit"] {
      width: 100%; padding: 12px; background: var(--accent); color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button[type="submit"]:hover { background: #52796f; }
    .flash { margin-bottom: 16px; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
    .flash.error { background: #faf0ed; color: #991b1b; }
    .flash.success { background: #f0f5f1; color: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-logo" style="margin-bottom: 24px;">
        <img src="{{ url_for('static', filename='img/logo_dark.png') }}" alt="Thṓth" style="width: 140px; height: auto;">
      </div>
      <h1>Thṓth - Sistema Notarial</h1>
      <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 6px;">Entre com seu e-mail e senha. A senha é a mesma usada no ODIN.</p>
    </div>
    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
          <div class="flash {{ category }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autofocus placeholder="nome@cartorioitapolis.com.br">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required placeholder="••••••••">
        </div>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
